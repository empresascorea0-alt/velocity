name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, x86_64-linux-android

      - name: Cache Rust Tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-tools-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-tools-

      - name: Install Rust Tools
        run: |
          if ! command -v cargo-ndk &> /dev/null; then
            cargo install cargo-ndk
          fi
          if ! command -v cbindgen &> /dev/null; then
            cargo install cbindgen
          fi
          if ! command -v flutter_rust_bridge_codegen &> /dev/null || [ "$(flutter_rust_bridge_codegen --version | awk '{print $2}')" != "1.82.1" ]; then
            cargo install flutter_rust_bridge_codegen --version 1.82.1
          fi
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Setup Android NDK
        run: |
          yes | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --install "ndk;25.1.8937393"
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/25.1.8937393" >> $GITHUB_ENV

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build llvm-dev libclang-dev

      - name: Setup Environment Variables
        run: |
          touch .env
          echo "ONRAMPER_API_KEY=${{ secrets.ONRAMPER_API_KEY || 'dummy' }}" >> .env
          echo "INFURA_API_KEY=${{ secrets.INFURA_API_KEY || 'dummy' }}" >> .env
          echo "UD_API_KEY=${{ secrets.UD_API_KEY || 'dummy' }}" >> .env
          echo "MESSAGES_API_KEY=${{ secrets.MESSAGES_API_KEY || 'dummy' }}" >> .env
          echo "CAPTCHA_SITE_KEY=${{ secrets.CAPTCHA_SITE_KEY || 'dummy' }}" >> .env
          echo "HCAPTCHA_SITE_KEY=${{ secrets.HCAPTCHA_SITE_KEY || 'dummy' }}" >> .env
          echo "NANSWAP_API_KEY=${{ secrets.NANSWAP_API_KEY || 'dummy' }}" >> .env
          echo "MAGIC_SDK_KEY=${{ secrets.MAGIC_SDK_KEY || 'dummy' }}" >> .env
          echo "FIREBASE_WEB_API_KEY=${{ secrets.FIREBASE_WEB_API_KEY || 'dummy' }}" >> .env
          echo "FIREBASE_ANDROID_API_KEY=${{ secrets.FIREBASE_ANDROID_API_KEY || 'dummy' }}" >> .env
          echo "FIREBASE_IOS_API_KEY=${{ secrets.FIREBASE_IOS_API_KEY || 'dummy' }}" >> .env
          echo "FIREBASE_MACOS_API_KEY=${{ secrets.FIREBASE_MACOS_API_KEY || 'dummy' }}" >> .env

      - name: Build Rust Bridge
        run: |
          flutter pub get
          flutter_rust_bridge_codegen --skip-deps-check \
            --rust-input rust/src/username_registration.rs \
            --dart-output lib/generated/rust/username_registration.dart \
            --c-output ios/Runner/Generated/username_registration.h \
            --rust-output rust/src/username_registration_generated.rs \
            --class-name UsernameRegistration \
            --no-format
          
          mkdir -p android/app/src/main/jniLibs
          cd rust
          cargo ndk -t arm64-v8a -t armeabi-v7a -t x86_64 -o ../android/app/src/main/jniLibs build --release
          cd ..
          
          flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build APK (Debug)
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
