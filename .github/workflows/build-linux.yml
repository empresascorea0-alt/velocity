name: Build Linux Desktop

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev libclang-dev pkg-config

      - name: Install Rust Tools
        run: |
          cargo install cargo-expand
          cargo install flutter_rust_bridge_codegen --version 1.82.6 --force
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Build Rust Bridge
        run: |
          flutter pub get
          mkdir -p lib/generated/rust
          flutter_rust_bridge_codegen --skip-deps-check \
            --rust-input rust/src/username_registration.rs \
            --dart-output lib/generated/rust/username_registration.dart \
            --rust-output rust/src/username_registration_generated.rs \
            --class-name UsernameRegistration
          
          cd rust
          cargo build --release
          cd ..

      - name: Build Linux
        run: |
          flutter config --enable-linux-desktop
          flutter build linux --verbose

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: build/linux/x64/release/bundle/
